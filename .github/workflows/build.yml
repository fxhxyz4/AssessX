name: Build JavaFX App

on:
  push:
    branches: ["main"]
  workflow_dispatch:

jobs:
  build-linux:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21

      - name: Build Linux jlink
        run: mvn clean javafx:jlink
        working-directory: AssessX

      - name: Upload Linux runtime
        uses: actions/upload-artifact@v4
        with:
          name: linux-runtime
          path: AssessX/target/app

  build-windows:
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21

      - name: Build jar
        run: mvn clean package
        working-directory: AssessX

      - name: Upload jar (Windows)
        uses: actions/upload-artifact@v4
        with:
          name: windows-jar
          path: AssessX/target/*.jar

  build-macos:
    runs-on: macos-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21

      - name: Build jar
        run: mvn clean package
        working-directory: AssessX

      - name: Upload jar (macOS)
        uses: actions/upload-artifact@v4
        with:
          name: macos-jar
          path: AssessX/target/*.jar
